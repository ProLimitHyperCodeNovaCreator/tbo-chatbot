version: '3.8'

services:
  hotel-search-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel-search-engine
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - PORT=5000
      - HOST=0.0.0.0
      - MAX_RESULTS=10
      - PYTHONUNBUFFERED=1
    volumes:
      - ./search_results.json:/app/search_results.json
      - ./results:/app/results
    networks:
      - hotel-search-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  hotel-search-network:
    driver: bridge
